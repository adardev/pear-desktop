<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Music</title>
  <style>
    :root {
      --bg-color: #030303;
      --accent-gradient: linear-gradient(135deg, #FF632F 0%, #DC148C 100%);
      --logo-shadow: 0 12px 36px rgba(220, 20, 140, 0.4);
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-color);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .logo-container {
      position: relative;
      width: 128px;
      height: 128px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 8px 24px rgba(220, 20, 140, 0.35));
      animation: pulse 2.5s infinite ease-in-out;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
      margin: 0 0 8px 0;
      opacity: 0.95;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 500;
      color: #a0a0a0;
      margin: 0 0 40px 0;
      letter-spacing: 0.2px;
    }

    /* Elegant, premium loading ring */
    .loader-container {
      position: relative;
      width: 40px;
      height: 40px;
    }

    .loader {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border: 3px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      border-top-color: #FF632F;
      animation: spin 1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
      position: relative;
    }

    /* Glow ring to add depth */
    .loader::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      border: 3px solid transparent;
      border-top-color: #DC148C;
      border-radius: 50%;
      opacity: 0.6;
      filter: blur(2px);
      animation: spin 1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 8px 24px rgba(220, 20, 140, 0.35));
      }
      50% {
        transform: scale(1.03);
        filter: drop-shadow(0 12px 32px rgba(255, 99, 47, 0.55));
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <!-- Embedded App Icon SVG for instant display without network request -->
      <svg class="logo-svg" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g>
          <circle cx="512" cy="512" r="410" fill="url(#paint0_linear_18_2)" />
          <circle cx="512" cy="512" r="402" stroke="url(#paint1_radial_18_2)" stroke-opacity="0.5" stroke-width="16" />
        </g>
        <path d="M675 505.072C680.333 508.152 680.333 515.849 675 518.928L436.5 656.626C431.167 659.705 424.5 655.857 424.5 649.698V374.302C424.5 368.24 430.96 364.415 436.249 367.234L436.5 367.374L675 505.072Z" fill="url(#paint2_linear_18_2)" stroke="url(#paint3_linear_18_2)" stroke-width="8" stroke-linejoin="round" />
        <defs>
          <linearGradient id="paint0_linear_18_2" x1="102" y1="102" x2="922" y2="922" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF632F" />
            <stop offset="1" stop-color="#DC148C" />
          </linearGradient>
          <radialGradient id="paint1_radial_18_2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 512) rotate(45) scale(579.828)">
            <stop offset="0.68" stop-color="white" stop-opacity="0" />
            <stop offset="0.72" stop-color="white" />
          </radialGradient>
          <linearGradient id="paint2_linear_18_2" x1="512" y1="329" x2="512" y2="695" gradientUnits="userSpaceOnUse">
            <stop stop-color="white" />
            <stop offset="1" stop-color="white" stop-opacity="0.4" />
          </linearGradient>
          <linearGradient id="paint3_linear_18_2" x1="512" y1="329" x2="512" y2="695" gradientUnits="userSpaceOnUse">
            <stop stop-color="white" stop-opacity="0" />
            <stop offset="1" stop-color="white" stop-opacity="0.5" />
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="title">YouTube Music</div>
    <div class="subtitle">Loading player controls...</div>
    <div class="loader-container">
      <div class="loader"></div>
    </div>
  </div>
</body>
</html>
